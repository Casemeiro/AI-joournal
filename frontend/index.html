<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First AI Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar: past entries -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Past entries</span>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close">&#10005;</button>
    </div>
    <ul class="entry-list" id="entry-list">
      <li class="entry-list-empty">No entries yet.</li>
    </ul>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main layout -->
  <div class="shell">

    <!-- Top bar -->
    <header class="topbar">
      <button class="icon-btn" id="open-sidebar" title="View past entries">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="8.25" width="10" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="12.5" width="12" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
      <span class="logo">&#9998; First AI Journal</span>
      <span class="topbar-date" id="topbar-date"></span>
    </header>

    <!-- Journal composer -->
    <main class="composer">
      <div class="composer-inner">
        <label class="composer-label" for="journal-input">
          What happened today?
        </label>
        <textarea
          id="journal-input"
          class="journal-textarea"
          placeholder="Write freely — your thoughts, feelings, events, anything on your mind..."
          rows="8"
          maxlength="5000"
        ></textarea>
        <div class="composer-footer">
          <span class="char-count"><span id="char-count">0</span> / 5000</span>
          <button class="save-btn" id="save-btn">Save entry</button>
        </div>
      </div>
    </main>

    <!-- Insights panel -->
    <section class="insights-section" id="insights-section" aria-live="polite">
      <!-- Filled dynamically by app.js -->
    </section>

  </div>

  <!-- Entry detail modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-date" id="modal-date"></span>
        <button class="icon-btn modal-close" id="modal-close" aria-label="Close">&#10005;</button>
      </div>
      <div class="modal-body">
        <p class="modal-content" id="modal-content"></p>
      </div>
      <div class="modal-insights" id="modal-insights"></div>
      <div class="modal-footer">
        <button class="delete-btn" id="modal-delete">Delete entry</button>
      </div>
    </div>
  </div>

  <script src="backend-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
